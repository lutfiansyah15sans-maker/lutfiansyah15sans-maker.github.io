<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LajuPDF - Konverter File Gratis & Premium</title>
    <meta name="description"
        content="Solusi cerdas untuk mengonversi gambar dan dokumen Office Anda menjadi PDF berkualitas tinggi dalam hitungan detik. 100% Gratis dan Aman." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        /* [STYLE TETAP SAMA SEPERTI KODE TERBARU KAMU] */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: #f4f7fe;
            color: #1e293b;
            min-height: 100vh;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .page-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f4f7fe;
            color: #1e293b;
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 50px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #4f46e5;
            letter-spacing: -1px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-tag {
            font-weight: 600;
            color: #4f46e5;
            font-size: 14px;
            background: #e0e7ff;
            padding: 8px 18px;
            border-radius: 20px;
        }

        .theme-toggle-btn {
            background: transparent;
            border: none;
            font-size: 22px;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .theme-toggle-btn:hover {
            color: #4f46e5;
            background: #e0e7ff;
        }

        .hero {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            padding: 100px 20px 120px;
            text-align: center;
            color: white;
            margin-bottom: -60px;
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100px;
            bottom: -50px;
            left: 0;
            background: #f4f7fe;
            transform: skewY(-2deg);
            transition: background-color 0.3s ease;
        }

        .hero h1 {
            font-size: 46px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            position: relative;
            z-index: 2;
        }

        .hero p {
            font-size: 18px;
            color: #e0e7ff;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
            position: relative;
            z-index: 2;
        }

        .tools-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            position: relative;
            z-index: 10;
        }

        .tool-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.12);
            border-color: #c7d2fe;
        }

        .icon-circle {
            width: 75px;
            height: 75px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .tool-card:hover .icon-circle {
            transform: scale(1.1);
        }

        .tool-title {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1e293b;
        }

        .tool-desc {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
        }

        #workspace-container {
            display: flex;
            padding: 60px 20px;
            flex: 1;
            z-index: 20;
            position: relative;
            justify-content: center;
        }

        #workspace {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .workspace-top {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 30px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            border: none;
            color: #64748b;
            font-size: 15px;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-back:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 70px 20px;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
        }

        .upload-area:hover {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        .upload-area i {
            font-size: 48px;
            color: #94a3b8;
            margin-bottom: 16px;
            display: block;
        }

        .upload-area h3 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .upload-area p {
            font-size: 14px;
            color: #64748b;
        }

        #file-info {
            font-weight: 700;
            color: #10b981;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .format-select {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 25px auto;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            background-color: #f8fafc;
            color: #4f46e5;
            outline: none;
            cursor: pointer;
        }

        #split-options {
            max-width: 350px;
            margin: 0 auto 25px auto;
            text-align: left;
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

        #pdf-page-count {
            font-size: 14px;
            color: #10b981;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }

        #split-pages-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #cbd5e1;
            font-size: 15px;
            margin-top: 10px;
            outline: none;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.3);
        }

        .loading-text {
            color: #4f46e5;
            font-weight: 700;
            font-size: 16px;
            margin-top: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* [DARK MODE STYLES SAMA] */
        body.dark-mode {
            background-color: #0f172a;
            color: #f8fafc;
        }

        body.dark-mode .page-shell {
            background-color: #0f172a;
        }

        body.dark-mode header {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.dark-mode .hero::after {
            background: #0f172a;
        }

        body.dark-mode .tool-card {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode #workspace {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .upload-area {
            background: #0f172a;
            border-color: #475569;
        }

        body.dark-mode #split-options {
            background: #0f172a;
            border-color: #475569;
        }

        body.dark-mode #split-pages-input {
            background: #1e293b;
            color: #f8fafc;
            border-color: #475569;
        }
    </style>
</head>
