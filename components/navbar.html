<header>
            <a href="/" class="logo" id="logo-btn"
                style="display: flex !important; align-items: center !important; gap: 0 !important; text-decoration: none;">
                <img src="logo-favicon-terbaru.png" alt="LajuPDF Icon"
                    style="height: 36px !important; width: auto !important; margin: 0 4px 0 0 !important; padding: 0 !important; display: block !important;">
                <span
                    style="margin: 0 !important; padding: 0 !important; line-height: 1 !important; font-size: 24px !important; font-weight: 800 !important; color: #3b82f6 !important; letter-spacing: -0.5px;">LajuPDF</span>
            </a>
            <div class="header-right">
                <div class="header-tag" id="header-tag-text">Alat Konversi Premium</div>

                <!-- Language Switcher -->
                <div class="lang-switcher" id="lang-switcher">
                    <button class="lang-btn" id="lang-btn" type="button" title="Switch Language">
                        <span id="lang-btn-flag">🇮🇩</span>
                        <span id="lang-btn-label">ID</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="lang-dropdown" id="lang-dropdown">
                        <button class="lang-option active" type="button" data-lang="id"><span class="flag">🇮🇩</span>
                            Indonesia</button>
                        <button class="lang-option" type="button" data-lang="en"><span class="flag">🇬🇧</span>
                            English</button>
                        <button class="lang-option" type="button" data-lang="es"><span class="flag">🇪🇸</span>
                            Español</button>
                        <button class="lang-option" type="button" data-lang="fr"><span class="flag">🇫🇷</span>
                            Français</button>
                        <button class="lang-option" type="button" data-lang="de"><span class="flag">🇩🇪</span>
                            Deutsch</button>
                        <button class="lang-option" type="button" data-lang="pt"><span class="flag">🇵🇹</span>
                            Português</button>
                        <button class="lang-option" type="button" data-lang="it"><span class="flag">🇮🇹</span>
                            Italiano</button>
                        <button class="lang-option" type="button" data-lang="nl"><span class="flag">🇳🇱</span>
                            Nederlands</button>
                        <button class="lang-option" type="button" data-lang="ru"><span class="flag">🇷🇺</span>
                            Русский</button>
                        <button class="lang-option" type="button" data-lang="uk"><span class="flag">🇺🇦</span>
                            Українська</button>
                        <button class="lang-option" type="button" data-lang="pl"><span class="flag">🇵🇱</span>
                            Polski</button>
                        <button class="lang-option" type="button" data-lang="tr"><span class="flag">🇹🇷</span>
                            Türkçe</button>
                        <button class="lang-option" type="button" data-lang="ar"><span class="flag">🇸🇦</span>
                            العربية</button>
                        <button class="lang-option" type="button" data-lang="hi"><span class="flag">🇮🇳</span>
                            हिन्दी</button>
                        <button class="lang-option" type="button" data-lang="zh"><span class="flag">🇨🇳</span>
                            中文</button>
                        <button class="lang-option" type="button" data-lang="ja"><span class="flag">🇯🇵</span>
                            日本語</button>
                        <button class="lang-option" type="button" data-lang="ko"><span class="flag">🇰🇷</span>
                            한국어</button>
                        <button class="lang-option" type="button" data-lang="vi"><span class="flag">🇻🇳</span> Tiếng
                            Việt</button>
                        <button class="lang-option" type="button" data-lang="ms"><span class="flag">🇲🇾</span>
                            Melayu</button>
                        <button class="lang-option" type="button" data-lang="th"><span class="flag">🇹🇭</span>
                            ภาษาไทย</button>
                    </div>
                </div>

                <button id="theme-toggle" class="theme-toggle-btn" title="Ganti Tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>
